version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rocketlog
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      target: development
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=3333
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true

volumes:
  pgdata:
